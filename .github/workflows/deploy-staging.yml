name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: companion-staging
  ENVIRONMENT: staging
  BACKEND_IMAGE_NAME: companion-backend
  WEB_IMAGE_NAME: companion-web

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            web:
              - 'web/**'
            terraform:
              - 'infrastructure/terraform/**'

  # ── Terraform (if infra changed) ──────────────────────────────────────────
  terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.STAGING_GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT_ID }}-tf-state" \
            -backend-config="prefix=${{ env.ENVIRONMENT }}"
      - name: Terraform plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="backend_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.BACKEND_IMAGE_NAME }}:latest" \
            -var="web_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.WEB_IMAGE_NAME }}:latest" \
            -out=tfplan
      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan

  # ── Build backend ─────────────────────────────────────────────────────────
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.STAGING_GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          docker build -f infrastructure/Dockerfile.backend -t "$IMAGE" backend/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── Migrate database ──────────────────────────────────────────────────────
  migrate:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.STAGING_GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Run Alembic migration
        run: |
          gcloud run jobs execute companion-${{ env.ENVIRONMENT }}-migrate \
            --region ${{ env.GCP_REGION }} \
            --wait \
            --project ${{ env.GCP_PROJECT_ID }}

  # ── Deploy backend ────────────────────────────────────────────────────────
  deploy-backend:
    needs: [build-backend, migrate]
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.STAGING_GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: companion-${{ env.ENVIRONMENT }}-backend
          image: ${{ needs.build-backend.outputs.image }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Smoke test
        run: |
          URL=$(gcloud run services describe companion-${{ env.ENVIRONMENT }}-backend \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
          echo "✓ Health check passed: $URL"

  # ── Build and deploy web ──────────────────────────────────────────────────
  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.STAGING_GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}"
          docker build -f infrastructure/Dockerfile.web \
            --build-arg VITE_API_BASE_URL=${{ vars.STAGING_API_BASE_URL }} \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.STAGING_GCP_SA_KEY }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: companion-${{ env.ENVIRONMENT }}-web
          image: ${{ needs.build-web.outputs.image }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
