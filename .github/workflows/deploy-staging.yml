name: Deploy to Staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: companion-staging-491606
  ENVIRONMENT: staging
  BACKEND_IMAGE_NAME: companion-backend
  WEB_IMAGE_NAME: companion-web

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            web:
              - 'web/**'
            terraform:
              - 'infrastructure/terraform/**'

  # ── Terraform (if infra changed) ──────────────────────────────────────────
  terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.STAGING_SA_EMAIL }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.0"
      - name: Terraform init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT_ID }}-tf-state" \
            -backend-config="prefix=${{ env.ENVIRONMENT }}"
      - name: Import manually-created secrets
        working-directory: infrastructure/terraform
        continue-on-error: true
        run: |
          terraform import \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="backend_image=placeholder" \
            -var="web_image=placeholder" \
            'module.secrets.google_secret_manager_secret.manual["pipeline-api-key"]' \
            "projects/${{ env.GCP_PROJECT_ID }}/secrets/companion-${{ env.ENVIRONMENT }}-pipeline-api-key" \
            2>/dev/null || true
      - name: Terraform plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="backend_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.BACKEND_IMAGE_NAME }}:latest" \
            -var="web_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.WEB_IMAGE_NAME }}:latest" \
            -out=tfplan
      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan

  # ── Build backend ─────────────────────────────────────────────────────────
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.STAGING_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push
        id: build
        run: |
          REPO="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}"
          IMAGE="$REPO/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          docker build -f infrastructure/Dockerfile.backend -t "$IMAGE" -t "$REPO/${{ env.BACKEND_IMAGE_NAME }}:latest" backend/
          docker push "$IMAGE"
          docker push "$REPO/${{ env.BACKEND_IMAGE_NAME }}:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── Run database migrations ───────────────────────────────────────────────
  migrate:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.STAGING_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Update migration job image
        run: |
          gcloud run jobs update companion-${{ env.ENVIRONMENT }}-migrate \
            --image ${{ needs.build-backend.outputs.image }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --command alembic --args "upgrade,head" \
            --quiet
      - name: Run migrations
        run: |
          gcloud run jobs execute companion-${{ env.ENVIRONMENT }}-migrate \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --wait

  # ── Deploy backend ────────────────────────────────────────────────────────
  deploy-backend:
    needs: [build-backend, migrate]
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.STAGING_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: companion-${{ env.ENVIRONMENT }}-backend
          image: ${{ needs.build-backend.outputs.image }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Smoke test
        run: |
          URL=$(gcloud run services describe companion-${{ env.ENVIRONMENT }}-backend \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
          echo "✓ Health check passed: $URL"

  # ── Build and deploy web ──────────────────────────────────────────────────
  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.STAGING_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push
        id: build
        run: |
          REPO="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}"
          IMAGE="$REPO/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}"
          docker build -f infrastructure/Dockerfile.web \
            --build-arg VITE_API_BASE_URL=${{ vars.STAGING_API_BASE_URL }} \
            --build-arg VITE_FIREBASE_API_KEY=${{ vars.STAGING_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ vars.STAGING_FIREBASE_AUTH_DOMAIN }} \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ vars.STAGING_FIREBASE_PROJECT_ID }} \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ vars.STAGING_FIREBASE_STORAGE_BUCKET }} \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.STAGING_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg VITE_FIREBASE_APP_ID=${{ vars.STAGING_FIREBASE_APP_ID }} \
            -t "$IMAGE" -t "$REPO/${{ env.WEB_IMAGE_NAME }}:latest" .
          docker push "$IMAGE"
          docker push "$REPO/${{ env.WEB_IMAGE_NAME }}:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.STAGING_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy companion-${{ env.ENVIRONMENT }}-web \
            --image ${{ needs.build-web.outputs.image }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --port 8080 \
            --allow-unauthenticated \
            --quiet
