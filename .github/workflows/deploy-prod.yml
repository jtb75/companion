name: Deploy to Production

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string
      skip_terraform:
        description: 'Skip Terraform apply (deploy app only)'
        required: false
        type: boolean
        default: false

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: companion-prod-491606
  ENVIRONMENT: prod
  BACKEND_IMAGE_NAME: companion-backend
  WEB_IMAGE_NAME: companion-web

jobs:
  # ── Safety gate ───────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment
        if: inputs.confirm != 'deploy'
        run: |
          echo "::error::Production deployment not confirmed. Type 'deploy' to proceed."
          exit 1
      - name: Confirmed
        run: echo "Production deployment confirmed"

  # ── Terraform ─────────────────────────────────────────────────────────────
  terraform:
    needs: validate
    if: inputs.skip_terraform == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_SA_EMAIL }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.0"
      - name: Terraform init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT_ID }}-tf-state" \
            -backend-config="prefix=${{ env.ENVIRONMENT }}"
      - name: Terraform plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="backend_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.BACKEND_IMAGE_NAME }}:latest" \
            -var="web_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.WEB_IMAGE_NAME }}:latest" \
            -out=tfplan
      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan

  # ── Build backend (reuse staging-tested image, retag for prod) ────────────
  build-backend:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          docker build -f infrastructure/Dockerfile.backend -t "$IMAGE" backend/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── Deploy backend ────────────────────────────────────────────────────────
  deploy-backend:
    needs: [build-backend]
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: companion-${{ env.ENVIRONMENT }}-backend
          image: ${{ needs.build-backend.outputs.image }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Smoke test
        run: |
          URL=$(gcloud run services describe companion-${{ env.ENVIRONMENT }}-backend \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::PRODUCTION health check failed with status $STATUS"
            exit 1
          fi
          echo "✓ Production health check passed: $URL"

  # ── Build and deploy web ──────────────────────────────────────────────────
  build-web:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/companion-${{ env.ENVIRONMENT }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}"
          docker build -f infrastructure/Dockerfile.web \
            --build-arg VITE_API_BASE_URL=${{ vars.PROD_API_BASE_URL }} \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_SA_EMAIL }}
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: companion-${{ env.ENVIRONMENT }}-web
          image: ${{ needs.build-web.outputs.image }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
