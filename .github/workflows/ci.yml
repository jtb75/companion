name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        working-directory: backend
        run: ruff check .

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: companion_test
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run migrations
        working-directory: backend
        env:
          COMPANION_DATABASE_URL: postgresql+asyncpg://companion:test@localhost:5432/companion_test
          COMPANION_REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        env:
          COMPANION_DATABASE_URL: postgresql+asyncpg://companion:test@localhost:5432/companion_test
          COMPANION_REDIS_URL: redis://localhost:6379/0
          COMPANION_ENVIRONMENT: test
        run: pytest -v

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if web exists
        id: check
        run: test -f web/package.json && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: web
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: web
        run: npm run lint

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform fmt check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive
      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: |
          terraform init -backend=false
          terraform validate
